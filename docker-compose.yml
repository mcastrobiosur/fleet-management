services:

  postgres-biosur:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-biosur}
      POSTGRES_USER: ${PGUSER:-biosur}
      POSTGRES_PASSWORD: ${PGPASSWORD:?PGPASSWORD is required}
    volumes:
      - postgres_data-biosur:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-biosur} -d ${PGDATABASE:-biosur}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-biosur:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data-biosur:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-biosur:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres-biosur:
        condition: service_healthy
      redis-biosur:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3008
      PGHOST: postgres-biosur
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-biosur}
      PGUSER: ${PGUSER:-biosur}
      PGPASSWORD: ${PGPASSWORD:?PGPASSWORD is required}
      REDIS_HOST: redis-biosur
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    expose:
      - "3008"

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend-biosur
    ports:
      - "${DASHBOARD_PORT:-80}:80"

volumes:
  postgres_data-biosur:
  redis_data-biosur:
